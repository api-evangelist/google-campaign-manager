          hints:
            readOnly: true
            openWorld: true
          call: "campaign-manager.get-ad"
          with:
            profileId: "tools.profileId"
            adId: "tools.adId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-ad
          description: "Create a new ad."
          hints:
            readOnly: false
          call: "campaign-manager.create-ad"
          with:
            profileId: "tools.profileId"
          outputParameters:
            - type: object
