      name: campaigns
      description: Campaign management.
      operations:
      - method: GET
        name: list-campaigns
        description: List campaigns.
        call: campaign-manager.list-campaigns
        with:
          profileId: rest.profileId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-campaign
        description: Create a campaign.
        call: campaign-manager.create-campaign
