          outputParameters:
            - type: object
              mapping: "$."
        - name: create-campaign
          description: "Create a new advertising campaign."
          hints:
            readOnly: false
          call: "campaign-manager.create-campaign"
          with:
            profileId: "tools.profileId"
          outputParameters:
            - type: object
