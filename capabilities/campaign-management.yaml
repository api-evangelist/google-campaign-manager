        - name: list-placements
          description: "List ad placements."
          hints:
            readOnly: true
            openWorld: true
          call: "campaign-manager.list-placements"
          with:
            profileId: "tools.profileId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-placement
          description: "Get placement details by ID."
          hints:
            readOnly: true
            openWorld: true
          call: "campaign-manager.get-placement"
          with:
            profileId: "tools.profileId"
            placementId: "tools.placementId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-placement
          description: "Create a new placement."
          hints:
            readOnly: false
          call: "campaign-manager.create-placement"
          with:
            profileId: "tools.profileId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-placement
          description: "Update an existing placement."
          hints:
            readOnly: false
            idempotent: true
          call: "campaign-manager.update-placement"
          with:
            profileId: "tools.profileId"
            placementId: "tools.placementId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: generate-placement-tags
          description: "Generate ad tags for placements."
          hints:
            readOnly: false
          call: "campaign-manager.generate-placement-tags"
          with:
            profileId: "tools.profileId"
          outputParameters:
            - type: object
