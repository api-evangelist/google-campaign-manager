  - name: Campaign Manager 360 Data Transfer v2.0
    description: >-
      Data Transfer v2.0 provides raw, event-level reporting data from Campaign
      Manager 360 beyond what is available through standard reporting. Data is
      delivered to Google Cloud Storage as CSV files for advanced analysis and
      data warehousing use cases.
    image: https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png
    humanURL: https://developers.google.com/doubleclick-advertisers/dtv2/overview
