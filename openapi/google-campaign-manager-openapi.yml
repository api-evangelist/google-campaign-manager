                  type: integer
            kind:
              type: string
              readOnly: true
        obaEnabled:
          type: boolean
          description: >-
            Whether OBA icons are enabled for this placement.
        obaSettings:
          type: object
          properties:
            iconClickThroughUrl:
              type: string
              format: uri
            iconClickTrackingUrl:
              type: string
              format: uri
            iconViewTrackingUrl:
              type: string
              format: uri
            program:
              type: string
            resourceUrl:
              type: string
              format: uri
            size:
              $ref: '#/components/schemas/Size'
            xPosition:
              type: string
            yPosition:
              type: string
        orientation:
          type: string
          description: Video orientation setting.
          enum:
            - ANY
            - LANDSCAPE
            - PORTRAIT
        kind:
          type: string
          readOnly: true

    LookbackConfiguration:
      type: object
      description: Lookback window configuration for attribution.
      properties:
        clickDuration:
          type: integer
          description: >-
            Lookback window, in days, from the last time a given user
            clicked on one of your ads.
        postImpressionActivitiesDuration:
          type: integer
          description: >-
            Lookback window, in days, from the last time a given user
            viewed one of your ads.

    TagSetting:
      type: object
      description: Tag settings for a placement.
      properties:
        additionalKeyValues:
          type: string
          description: Additional key-values to append to tags.
        includeClickTracking:
          type: boolean
          description: Whether to include click-tracking string in tags.
        includeClickThroughUrls:
          type: boolean
          description: Whether to include click-through URLs in tags.
        keywordOption:
          type: string
          description: Option specifying how keywords are embedded in ad tags.
          enum:
            - PLACEHOLDER_WITH_LIST_OF_KEYWORDS
            - IGNORE
            - GENERATE_SEPARATE_TAG_FOR_EACH_KEYWORD

    PlacementTag:
      type: object
      description: A generated placement tag.
      properties:
        placementId:
          type: string
          description: The placement ID this tag is generated for.
        tagDatas:
          type: array
          description: Tags generated for this placement.
          items:
            type: object
            properties:
              format:
                type: string
                description: Tag format type.
              impressionTag:
                type: string
                description: The tag string for impressions.
              clickTag:
                type: string
                description: The tag string for clicks.
              adId:
                type: string
              creativeId:
                type: string

